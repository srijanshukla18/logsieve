replicaCount: 1

image:
  repository: logsieve/logsieve
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  metricsPort: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: logsieve.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  namespace: ""

config:
  server:
    port: 8080
    address: "0.0.0.0"
    readTimeout: 30s
    writeTimeout: 30s
    idleTimeout: 60s

  ingestion:
    maxBatchSize: 1000
    flushInterval: 5s
    maxMemoryMB: 100
    bufferSize: 10000
    maxRequestSize: 10485760
    queueType: memory

  dedup:
    engine: drain3
    cacheSize: 10000
    contextLines: 5
    similarityThreshold: 0.9
    patternTTL: 1h
    fingerprintTTL: 30m

  profiles:
    autoDetect: true
    localPath: /etc/logsieve/profiles
    cachePath: /var/cache/logsieve/profiles
    defaultProfile: generic
    trustMode: offline

  outputs:
    - name: stdout
      type: stdout
      batchSize: 100
      timeout: 10s
      retries: 3

  metrics:
    enabled: true
    port: 9090
    path: /metrics

  logging:
    level: info
    format: json
    output: stdout
    structured: true

extraEnv: []

extraVolumes: []

extraVolumeMounts: []

profiles: {}
