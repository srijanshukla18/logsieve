# LogSieve Development Environment
# Usage: docker-compose -f docker-compose.dev.yml up
#
# This provides a complete local development stack:
# - LogSieve (built from source)
# - Fluent Bit (log collector)
# - Loki (log storage)
# - Grafana (visualization at http://localhost:3000)
# - Prometheus (metrics at http://localhost:9091)
# - MinIO (S3-compatible storage at http://localhost:9001)
# - Log Generator (test traffic)
#
# After startup:
#   curl http://localhost:8080/health          # LogSieve health
#   curl http://localhost:8080/ingest -X POST  # Send logs
#   curl http://localhost:9090/metrics         # Prometheus metrics
#   open http://localhost:3000                 # Grafana (admin/admin)

version: '3.8'

services:
  # ===========================================
  # LogSieve - The main application
  # ===========================================
  logsieve:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"  # HTTP ingestion
      - "9090:9090"  # Metrics
    volumes:
      - ./config.dev.yaml:/etc/logsieve/config.yaml:ro
      - ./profiles:/etc/logsieve/profiles:ro
    environment:
      - LOGSIEVE_LOGGING_LEVEL=debug
      - LOGSIEVE_LOGGING_STRUCTURED=false
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - logsieve-dev

  # ===========================================
  # Fluent Bit - Log Collector
  # ===========================================
  fluent-bit:
    image: fluent/fluent-bit:2.1
    volumes:
      - ./test/fluent-bit.dev.conf:/fluent-bit/etc/fluent-bit.conf:ro
    depends_on:
      logsieve:
        condition: service_healthy
    networks:
      - logsieve-dev

  # ===========================================
  # Loki - Log Storage Backend
  # ===========================================
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./test/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - logsieve-dev

  # ===========================================
  # Grafana - Visualization
  # ===========================================
  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./test/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - logsieve-dev

  # ===========================================
  # Prometheus - Metrics Collection
  # ===========================================
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9091:9090"
    volumes:
      - ./test/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - logsieve-dev

  # ===========================================
  # MinIO - S3-Compatible Storage
  # ===========================================
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - logsieve-dev

  # Create default bucket on startup
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/logsieve-logs --ignore-existing;
      mc anonymous set download myminio/logsieve-logs;
      exit 0;
      "
    networks:
      - logsieve-dev

  # ===========================================
  # Log Generator - Test Traffic
  # ===========================================
  log-generator:
    image: alpine:3.18
    depends_on:
      logsieve:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache curl;
      echo 'Waiting for LogSieve...';
      sleep 5;
      echo 'Starting log generation...';
      i=0;
      while true; do
        i=$$((i + 1));

        # Nginx-style access logs
        curl -s -X POST http://logsieve:8080/ingest \
          -H 'Content-Type: application/json' \
          -H 'X-Source: log-generator' \
          -d '{\"log\": \"192.168.1.'$$((i % 255))' - - ['$$(date +%d/%b/%Y:%H:%M:%S)' +0000] \\\"GET /api/v1/users/'$$i' HTTP/1.1\\\" 200 1234\", \"time\": \"'$$(date -Iseconds)'\", \"labels\": {\"container_name\": \"nginx\", \"image\": \"nginx:latest\"}}';

        # Application logs with varying levels
        case $$((i % 10)) in
          0) level='ERROR'; msg='Connection refused to database server 10.0.0.'$$((i % 10));;
          1) level='WARN'; msg='High memory usage detected: '$$((50 + i % 50))'%';;
          *) level='INFO'; msg='Request processed successfully in '$$((10 + i % 100))'ms';;
        esac;

        curl -s -X POST http://logsieve:8080/ingest \
          -H 'Content-Type: application/json' \
          -H 'X-Source: log-generator' \
          -d '{\"log\": \"'$$(date -Iseconds)' '$$level' [main] com.example.App - '$$msg'\", \"time\": \"'$$(date -Iseconds)'\", \"labels\": {\"container_name\": \"app\", \"image\": \"java:17\"}}';

        # Duplicate logs (to test deduplication)
        curl -s -X POST http://logsieve:8080/ingest \
          -H 'Content-Type: application/json' \
          -H 'X-Source: log-generator' \
          -d '{\"log\": \"Health check passed\", \"time\": \"'$$(date -Iseconds)'\"}';

        # Batch of similar logs
        if [ $$((i % 5)) -eq 0 ]; then
          curl -s -X POST http://logsieve:8080/ingest \
            -H 'Content-Type: application/json' \
            -H 'X-Source: log-generator' \
            -d '{\"logs\": [
              {\"message\": \"User '$$i' logged in from 10.0.0.'$$((i % 255))'\", \"timestamp\": \"'$$(date -Iseconds)'\"},
              {\"message\": \"User '$$((i+1))' logged in from 10.0.0.'$$(((i+1) % 255))'\", \"timestamp\": \"'$$(date -Iseconds)'\"},
              {\"message\": \"User '$$((i+2))' logged in from 10.0.0.'$$(((i+2) % 255))'\", \"timestamp\": \"'$$(date -Iseconds)'\"}
            ]}';
        fi;

        sleep 2;
      done
      "
    networks:
      - logsieve-dev

networks:
  logsieve-dev:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
  prometheus-data:
  minio-data:
