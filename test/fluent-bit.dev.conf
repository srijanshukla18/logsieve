# Fluent Bit configuration for LogSieve development environment
# This configuration collects container logs and forwards to LogSieve

[SERVICE]
    Flush         2
    Daemon        off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   on
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# Dummy input for testing (generates logs periodically)
[INPUT]
    Name          dummy
    Tag           dummy.test
    Dummy         {"message": "Fluent Bit heartbeat", "level": "INFO"}
    Rate          0.2

# Forward all logs to LogSieve
[OUTPUT]
    Name          http
    Match         *
    Host          logsieve
    Port          8080
    URI           /ingest?profile=auto
    Format        json
    Retry_Limit   3
    tls           off
    Header        X-Source fluent-bit
    Header        Content-Type application/json
